      </p>
</div>

<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant/60">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border-mist-border rounded-lg bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:ring-1 focus:ring-secondary focus:border-secondary transition-colors placeholder:text-on-surface-variant/40 shadow-sm shadow-ink-text/5" id="username" name="username" placeholder="请输入用户名或邮箱" type="text" value="scholar_li"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="password">密码</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant/60">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 border-mist-border rounded-lg bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:ring-1 focus:ring-secondary focus:border-secondary transition-colors placeholder:text-on-surface-variant/40 shadow-sm shadow-ink-text/5" id="password" name="password" placeholder="请输入密码" type="password" value="wrongpassword"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-on-surface-variant hover:text-secondary transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Captcha Field (Error State Example) -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="captcha">验证码</label>
<div class="flex gap-4 items-start">
<!-- Input part -->
<div class="flex-1 relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-error/60">shield</span>
</div>
<!-- Applied error border classes -->
<input class="block w-full pl-10 pr-3 py-3 border-error focus:ring-1 focus:ring-error focus:border-error rounded-lg bg-error-container/10 text-on-surface font-body-md text-body-md transition-colors placeholder:text-on-surface-variant/40 shadow-sm shadow-ink-text/5" id="captcha" name="captcha" placeholder="输入右侧字符" type="text" value="abcd"/>
</div>

<div class="relative w-32 h-[50px] rounded-lg bg-surface-variant overflow-hidden cursor-pointer group flex-shrink-0 border border-mist-border shadow-sm shadow-ink-text/5">

<span class="font-headline-sm text-headline-sm text-ink-text tracking-[0.2em] font-bold mix-blend-color-burn select-none italic" style="transform: skewX(-10deg);">W9X2</span>
</div>
<!-- Refresh Icon Overlay (Visible on Hover) -->
<div class="absolute inset-0 bg-inverse-surface/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-200 backdrop-blur-sm">
<span class="material-symbols-outlined text-white-card" style="font-variation-settings: 'FILL' 1;">refresh</span>
